<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="|${content.title} - MyKino|">제목 - MyKino</title>
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/content.css">
</head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>
    <script th:replace="~{fragments/header :: headerScript}"></script>

    <div class="content-backdrop"
         th:style="${content.backdropUrl != null and !content.backdropUrl.isEmpty()} ? |background-image: url('${content.backdropUrl}')| : ''">
    </div>

    <div class="content-hero">
        <div class="content-poster">
            <img th:if="${content.posterUrl != null and !content.posterUrl.isEmpty()}"
                 th:src="${content.posterUrl}" th:alt="${content.title}">
            <span th:unless="${content.posterUrl != null and !content.posterUrl.isEmpty()}">포스터 없음</span>
        </div>

        <div class="content-info">
            <h1 class="content-title" th:text="${content.title}">제목</h1>
            <p class="content-title-eng"
               th:if="${content.titleEng != null and !content.titleEng.isEmpty()}"
               th:text="${content.titleEng}">English</p>

            <div class="content-meta">
                <span class="meta-tag" th:text="${content.contentType.displayName}">영화</span>
                <span class="meta-tag" th:if="${content.releaseYear != null}" th:text="${content.releaseYear}">2026</span>
                <span class="meta-tag" th:if="${content.runtime != null}" th:text="|${content.runtime}분|">120분</span>
                <span class="meta-tag" th:if="${content.country != null and !content.country.isEmpty()}" th:text="${content.country}">한국</span>
                <span class="meta-tag" th:if="${content.ageRating != null and !content.ageRating.isEmpty()}" th:text="${content.ageRating}">전체</span>
            </div>

            <div class="content-genres" th:if="${content.genres != null and !content.genres.isEmpty()}">
                <span class="genre-tag" th:each="genre : ${content.genres}" th:text="${genre}">장르</span>
            </div>

            <div class="kino-score-section">
                <th:block th:if="${content.kinoColor != null}">
                    <div class="kino-badge" th:classappend="${#strings.toLowerCase(content.kinoColor)}"
                         th:text="${content.kinoScore}">0</div>
                    <div class="kino-info">
                        <span class="kino-status" th:text="${content.kinoColor.displayName}">추천</span>
                        <span class="kino-count" th:text="|${content.totalRatings}명 평가|">0명 평가</span>
                    </div>
                </th:block>
                <th:block th:unless="${content.kinoColor != null}">
                    <div class="kino-badge none">-</div>
                    <div class="kino-info">
                        <span class="kino-status">평가 부족</span>
                        <span class="kino-count">50명 이상 평가 시 활성화</span>
                    </div>
                </th:block>
            </div>

            <div class="watch-status-btns" id="watchStatusBtns"
                 sec:authorize="isAuthenticated()"
                 th:attr="data-content-id=${content.id}">
                <button class="watch-btn" th:classappend="${myWatchStatus == 'WANT_TO_WATCH'} ? 'active' : ''"
                        data-status="WANT_TO_WATCH">
                    <span class="watch-icon">&#128278;</span> 찜
                </button>
                <button class="watch-btn" th:classappend="${myWatchStatus == 'WATCHING'} ? 'active' : ''"
                        data-status="WATCHING">
                    <span class="watch-icon">&#9200;</span> 보는중
                </button>
                <button class="watch-btn" th:classappend="${myWatchStatus == 'WATCHED'} ? 'active' : ''"
                        data-status="WATCHED">
                    <span class="watch-icon">&#9989;</span> 봤어요
                </button>
            </div>
        </div>
    </div>

    <div class="content-body">

        <div class="section">
            <h2 class="section-title">어디서 볼 수 있나요?</h2>
            <div class="ott-grid" th:if="${content.ottInfos != null and !content.ottInfos.isEmpty()}">
                <div th:each="ott : ${content.ottInfos}"
                     class="ott-card"
                     th:classappend="${ott.ottName == '극장'} ? ' theater' : ''">
                    <div class="ott-left">
                        <th:block th:if="${ott.ottName == '극장'}">
                            <div class="ott-logo theater">🎬</div>
                            <div>
                                <div class="ott-name">극장 상영중</div>
                                <div class="ott-type">현재 극장에서 상영중</div>
                            </div>
                        </th:block>
                        <th:block th:unless="${ott.ottName == '극장'}">
                            <img class="ott-logo-img"
                                 th:if="${ott.logoUrl != null and !ott.logoUrl.isEmpty()}"
                                 th:src="${ott.logoUrl}" th:alt="${ott.ottName}">
                            <div class="ott-logo"
                                 th:unless="${ott.logoUrl != null and !ott.logoUrl.isEmpty()}"
                                 th:text="${#strings.substring(ott.ottName, 0, ott.ottName.length() < 2 ? ott.ottName.length() : 2)}">OT</div>
                            <div>
                                <div class="ott-name" th:text="${ott.ottName}">넷플릭스</div>
                                <div class="ott-type" th:if="${ott.isStreaming}">스트리밍</div>
                            </div>
                        </th:block>
                    </div>
                    <div class="ott-right">
                        <th:block th:if="${ott.ottName == '극장'}">
                            <span class="ott-theater-badge">상영중</span>
                        </th:block>
                        <th:block th:unless="${ott.ottName == '극장'}">
                            <span class="ott-streaming" th:if="${ott.isStreaming}">구독 시청</span>
                            <div class="ott-price" th:if="${ott.rentPrice != null}" th:text="|대여 ${ott.rentPrice}원|">대여 0원</div>
                            <div class="ott-price" th:if="${ott.buyPrice != null}" th:text="|구매 ${ott.buyPrice}원|">구매 0원</div>
                            <a th:if="${ott.baseUrl != null and !ott.baseUrl.isEmpty()}"
                               th:href="${ott.baseUrl}" target="_blank" class="ott-link">바로가기 &rarr;</a>
                        </th:block>
                    </div>
                </div>
            </div>
            <p style="color: #666;" th:if="${content.ottInfos == null or content.ottInfos.isEmpty()}">
                현재 제공 중인 OTT 정보가 없습니다.
            </p>
        </div>

        <div class="section" th:if="${content.directors != null and !content.directors.isEmpty()}">
            <h2 class="section-title">감독</h2>
            <div class="director-list">
                <div class="director-tag" th:each="director : ${content.directors}">
                    <span class="director-name" th:text="${director.name}">감독명</span>
                </div>
            </div>
        </div>

        <div class="section" th:if="${content.synopsis != null and !content.synopsis.isEmpty()}">
            <h2 class="section-title">줄거리</h2>
            <p class="synopsis-text" th:text="${content.synopsis}">줄거리</p>
        </div>

        <div class="section" th:if="${content.actors != null and !content.actors.isEmpty()}">
            <h2 class="section-title">출연진</h2>
            <div class="cast-list">
                <div class="cast-card" th:each="actor : ${content.actors}">
                    <div class="cast-avatar">
                        <img th:if="${actor.profileImage != null and !actor.profileImage.isEmpty()}"
                             th:src="${actor.profileImage}" th:alt="${actor.name}">
                        <span th:unless="${actor.profileImage != null and !actor.profileImage.isEmpty()}"
                              th:text="${#strings.substring(actor.name, 0, 1)}">배</span>
                    </div>
                    <div class="cast-name" th:text="${actor.name}">배우명</div>
                    <div class="cast-role"
                         th:if="${actor.characterName != null and !actor.characterName.isEmpty()}"
                         th:text="|${actor.characterName} 역|">역할</div>
                </div>
            </div>
        </div>

        <div class="section">
            <h2 class="section-title">평가 및 리뷰</h2>
            <div class="my-rating" id="myRating"
                 sec:authorize="isAuthenticated()"
                 th:attr="data-content-id=${content.id},data-traffic-color=${myTrafficColor},data-score=${myScore}">
                <div class="traffic-btns">
                    <button class="traffic-btn red" th:classappend="${myTrafficColor == 'RED'} ? 'active' : ''"
                            data-color="RED" title="별로예요">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                        </svg>
                        <span>별로예요</span>
                    </button>
                    <button class="traffic-btn yellow" th:classappend="${myTrafficColor == 'YELLOW'} ? 'active' : ''"
                            data-color="YELLOW" title="보통이에요">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                        </svg>
                        <span>보통이에요</span>
                    </button>
                    <button class="traffic-btn green" th:classappend="${myTrafficColor == 'GREEN'} ? 'active' : ''"
                            data-color="GREEN" title="추천해요">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                        </svg>
                        <span>추천해요</span>
                    </button>
                </div>
                <div class="rating-score">
                    <label>별점</label>
                    <div class="star-rating" id="starRating">
                        <span th:each="i : ${#numbers.sequence(1, 5)}"
                              class="star"
                              th:classappend="${myScore != null and myScore >= i} ? 'filled' : ''"
                              th:attr="data-value=${i}">&#9733;</span>
                    </div>
                    <span class="score-value" id="scoreValue" th:text="${myScore != null ? myScore : ''}"></span>
                </div>
                <textarea id="reviewBody" placeholder="이 작품에 대한 평가를 남겨보세요 (선택)" rows="3" maxlength="2000"></textarea>
                <div class="rating-form-bottom">
                    <label class="spoiler-check">
                        <input type="checkbox" id="reviewSpoiler"> 스포일러 포함
                    </label>
                    <button id="submitBtn" class="rating-submit-btn">평가하기</button>
                </div>
            </div>
            <div class="login-prompt" sec:authorize="isAnonymous()">
                <p>평가하려면 <a href="/login">로그인</a>이 필요합니다.</p>
            </div>
            <div id="reviewList" th:attr="data-content-id=${content.id}"></div>
            <div id="reviewMore" class="review-more" style="display:none;">
                <button id="reviewMoreBtn" class="review-more-btn">더보기</button>
            </div>
        </div>

    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>

    <script src="/js/util.js"></script>
    <script src="/js/content-detail.js"></script>
</body>
</html>
