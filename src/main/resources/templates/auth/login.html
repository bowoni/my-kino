<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - MyKino</title>
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
    <div th:replace="~{fragments/header :: header}"></div>
    <script th:replace="~{fragments/header :: headerScript}"></script>

    <div class="auth-container">
        <div class="auth-card">
            <h1 class="auth-title">로그인</h1>
            <p class="auth-subtitle">MyKino에 오신 것을 환영합니다</p>

            <div class="alert alert-error" th:if="${errorMessage}" th:text="${errorMessage}"></div>
            <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>

            <form action="/login" method="post" id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="email">이메일</label>
                    <input type="email" id="email" name="email" class="form-input"
                           placeholder="이메일을 입력하세요" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">비밀번호</label>
                    <input type="password" id="password" name="password" class="form-input"
                           placeholder="비밀번호를 입력하세요" required>
                </div>

                <label class="remember-email">
                    <input type="checkbox" id="rememberEmail"> 아이디 저장
                </label>

                <button type="submit" class="btn-primary">로그인</button>
            </form>

            <script>
            (function() {
                var emailInput = document.getElementById('email');
                var checkbox = document.getElementById('rememberEmail');
                var saved = localStorage.getItem('mykino_email');
                if (saved) {
                    emailInput.value = saved;
                    checkbox.checked = true;
                }
                document.getElementById('loginForm').addEventListener('submit', function() {
                    if (checkbox.checked) {
                        localStorage.setItem('mykino_email', emailInput.value);
                    } else {
                        localStorage.removeItem('mykino_email');
                    }
                });
            })();
            </script>

            <div class="social-divider">
                <span>또는</span>
            </div>

            <div class="social-login-btns">
                <a href="/oauth2/authorization/kakao" class="social-btn kakao-btn">
                    <svg class="social-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 3C6.48 3 2 6.36 2 10.44c0 2.62 1.74 4.93 4.38 6.25l-1.12 4.12c-.1.36.3.65.6.44l4.88-3.22c.42.04.84.07 1.26.07 5.52 0 10-3.36 10-7.66S17.52 3 12 3z"/>
                    </svg>
                    카카오 로그인
                </a>
                <a href="/oauth2/authorization/google" class="social-btn google-btn">
                    <svg class="social-icon" viewBox="0 0 24 24">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    Google 로그인
                </a>
            </div>

            <div class="auth-links">
                계정이 없으신가요? <a href="/signup">회원가입</a>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
